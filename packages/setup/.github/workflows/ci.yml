name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unix-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep fd-find fzf tmux zsh shellcheck gh
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(command -v fdfind)" "$HOME/.local/bin/fd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run shared CI checks
        run: bash scripts/ci-check.sh

  windows-powershell-checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell scripts parse cleanly
        shell: pwsh
        run: |
          $files = @('bootstrap.ps1', 'scripts/install-windows.ps1')
          $failed = $false
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              foreach ($error in $errors) {
                Write-Error "${file}: $($error.Message)"
              }
            }
          }
          if ($failed) { exit 1 }

      - name: Print Windows tool versions
        shell: pwsh
        run: |
          pwsh --version
          winget --version

  macos-checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Validate shell scripts (shellcheck)
        run: |
          find scripts/ -name '*.sh' -exec shellcheck --severity=error {} +
          shellcheck --severity=error bootstrap.sh

      - name: Validate Python scripts parse cleanly
        run: |
          python3 -m py_compile scripts/render-opencode-config.py
          python3 -m py_compile scripts/sync-toolkit-version.py
          python3 -m py_compile scripts/auth-mcp-tools.sh 2>/dev/null || true

      - name: Validate bootstrap --work-mac flag is parseable
        run: bash -n bootstrap.sh
