set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom
set -g status-style "bg=#11121a,fg=#a9b1d6"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]|#[default]"
set -g status-right "#[fg=#9ece6a]#(whoami)@#H #[fg=#565f89]| #[fg=#bb9af7]%Y-%m-%d #[fg=#7dcfff]%H:%M "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#c0caf5"
set -g mode-style "bg=#33467c,fg=#c0caf5"
set -g status-interval 5
set -s escape-time 10

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind f display-popup -E -w 80% -h 80% "$HOME/.config/tmux/sessionizer.sh"
bind C-f run-shell "$HOME/.config/tmux/sessionizer.sh \"#{pane_current_path}\""
bind n command-prompt -p "Session name" "run-shell '$HOME/.config/tmux/tmux-smart-new.sh %% \"#{pane_current_path}\"'"
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

setw -g mode-keys vi
setw -g automatic-rename on
setw -g allow-rename off
