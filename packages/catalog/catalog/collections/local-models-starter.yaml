id: local-models-starter
name: Local Models Starter
description: Run Llama, Qwen, Mistral, or other open-weight models on your
  own hardware — privacy, offline capability, zero per-token cost for bulk
  work. Bundles the docs + skills you need to pick a runtime (Ollama, LM
  Studio, llama.cpp), measure whether local pays off, and avoid the
  obvious failure modes. Ideal for NDA/offline/bulk-labeling workflows.
