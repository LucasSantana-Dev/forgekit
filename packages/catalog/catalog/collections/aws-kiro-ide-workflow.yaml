id: aws-kiro-ide-workflow
name: AWS Kiro IDE Workflow
description: >
  Curated toolkit for developers working in AWS Kiro IDE in a corporate environment.
  Covers context management, RAG recall, structured planning, code review, security,
  MCP server integration, and disciplined prompting — all without requiring homologation.
