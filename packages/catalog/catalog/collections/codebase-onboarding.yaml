name: Codebase Onboarding
description: 'Get productive in an unfamiliar codebase quickly — map the project structure, walk through core abstractions
  with a code tour, identify entry points, and pull live docs for the libraries in use. Useful for new hires, OSS contributors,
  and anyone inheriting a legacy project.

  '
