id: security-first-dev
name: Security-First Development
description: Security-aware development without the productivity tax — secret
  hygiene, dependency auditing, prompt-injection defence, hardened review
  cadence, and pre-merge hooks that catch the obvious mistakes early. Pairs
  with any stack; expensive to retrofit, cheap to start with.
