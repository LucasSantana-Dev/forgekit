id: docker
name: Docker
description: Read-and-write Docker control from the agent — list and inspect
  containers, fetch logs, exec one-off runs, deploy docker-compose stacks. Uses
  the local Docker socket, so the blast radius matches what your user can do
  via `docker` CLI. Best for homelab + local-stack debugging; avoid pointing
  it at production daemons without a dedicated, locked-down DOCKER_HOST.
transport: stdio
command: uvx
args:
- docker-mcp
tags:
- docker
- infra
- containers
- homelab
homepage: https://github.com/QuantGeekDev/docker-mcp
license: MIT
translations:
  pt-BR:
    name: Docker
    description: Controle Docker read-and-write a partir do agente — listar e
      inspecionar containers, buscar logs, rodar exec ad-hoc, fazer deploy de
      stacks docker-compose. Usa o socket Docker local, então o blast radius é
      o que seu usuário pode fazer via CLI `docker`. Ideal para homelab e
      stack local; evite apontar para daemons de produção sem um DOCKER_HOST
      dedicado e travado.
