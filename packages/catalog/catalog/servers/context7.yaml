id: context7
name: Context7
description: Upstash-hosted MCP server that fetches current documentation for
  libraries, frameworks, SDKs, CLI tools, and cloud services. Resolves library
  IDs, retrieves API syntax, configuration, migration notes, and setup instructions
  directly from upstream docs — far more reliable than training-data recall.
  Prefer over web search whenever the agent needs to write or debug code that
  depends on a specific library.
transport: stdio
command: npx
args:
- -y
- '@upstash/context7-mcp'
tags:
- docs
- reference
- library
- research
homepage: https://github.com/upstash/context7
license: MIT
translations:
  pt-BR:
    name: Context7
    description: Servidor MCP hospedado pela Upstash que busca documentação
      atualizada de bibliotecas, frameworks, SDKs, CLIs e serviços cloud. Resolve
      IDs de biblioteca, consulta sintaxe de API, configuração, notas de
      migração e passos de setup direto da doc oficial — muito mais confiável
      do que a memória do modelo. Prefira em vez de busca web sempre que o
      agente precisar escrever ou depurar código que depende de uma biblioteca
      específica.
