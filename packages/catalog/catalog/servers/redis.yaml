id: redis
name: Redis
description: Get, set, list, and delete keys in a Redis instance via the
  official MCP reference server. Works with any Redis-compatible endpoint
  (local, Docker, Upstash, Elasticache, Valkey) through a REDIS_URL connection
  string. Ideal for inspecting queue state, cache hits/misses, and session data
  during debugging — not intended for bulk migrations or persisted writes to
  production caches.
transport: stdio
command: npx
args:
- -y
- '@modelcontextprotocol/server-redis'
env:
- name: REDIS_URL
  description: Full Redis URL, e.g. redis://localhost:6379.
  required: true
  default: redis://localhost:6379
tags:
- database
- cache
- queue
- debugging
homepage: https://github.com/modelcontextprotocol/servers/tree/main/src/redis
license: MIT
translations:
  pt-BR:
    name: Redis
    description: Get, set, list e delete de chaves em uma instância Redis via
      servidor MCP de referência oficial. Funciona com qualquer endpoint
      compatível com Redis (local, Docker, Upstash, Elasticache, Valkey) por
      uma connection string REDIS_URL. Ideal para inspecionar estado de fila,
      hits/misses de cache e dados de sessão durante debug — não para
      migrações em bulk ou writes persistidos em caches de produção.
