id: memory
name: Memory (Knowledge Graph)
description: Official MCP reference implementation of a knowledge-graph memory
  store — entities, relations, and observations persisted across sessions in a
  local JSON file. Good default for "remember this fact for next time" without
  adding a database. Not a general-purpose vector store; for long-form retrieval
  pair with a RAG pipeline instead.
transport: stdio
command: npx
args:
- -y
- '@modelcontextprotocol/server-memory'
tags:
- memory
- knowledge-graph
- persistence
homepage: https://github.com/modelcontextprotocol/servers/tree/main/src/memory
license: MIT
translations:
  pt-BR:
    name: Memory (Grafo de Conhecimento)
    description: Implementação MCP oficial de referência para memória baseada
      em grafo de conhecimento — entidades, relações e observações persistidas
      entre sessões em um arquivo JSON local. Default bom para "lembre esse
      fato na próxima vez" sem adicionar um banco. Não é um vector store geral;
      para retrieval de texto longo combine com um pipeline de RAG.
