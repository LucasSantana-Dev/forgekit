id: kubernetes
name: Kubernetes
description: Read and edit live Kubernetes cluster state — pods, nodes, events,
  logs, deployments, services, arbitrary custom resources. Honors whichever
  context your KUBECONFIG points at, so a misconfigured kubeconfig is a
  production-risk event. Use only against dev, staging, or homelab clusters;
  for production, review every agent action before apply, or wrap the server
  in a read-only kubeconfig.
transport: stdio
command: npx
args:
- -y
- mcp-server-kubernetes
env:
- name: KUBECONFIG
  description: Path to kubeconfig. Defaults to ~/.kube/config.
  required: false
tags:
- kubernetes
- infra
- homelab
- ops
homepage: https://github.com/Flux159/mcp-server-kubernetes
license: MIT
translations:
  pt-BR:
    name: Kubernetes
    description: Leia + edite o estado do cluster ao vivo — pods, nodes, events, logs,
      recursos. Use apenas em clusters de dev/homelab, não em produção sem revisão
      humana.
