id: github
name: GitHub
description: Official GitHub MCP server — access PRs, issues, reviews, CI
  checks, commits, branches, and releases with a structured schema the agent
  can reason about. Preferred over raw `gh` CLI because list-and-filter
  responses come back typed, not parsed from shell output. Scope the
  GITHUB_PERSONAL_ACCESS_TOKEN narrowly (contents, pull-requests, issues) and
  rotate quarterly.
transport: stdio
command: docker
args:
- run
- -i
- --rm
- -e
- GITHUB_PERSONAL_ACCESS_TOKEN
- ghcr.io/github/github-mcp-server
env:
- name: GITHUB_PERSONAL_ACCESS_TOKEN
  description: A fine-scoped personal access token (contents, pull-requests, issues).
  required: true
tags:
- github
- pr
- issues
- ci
- vcs
homepage: https://github.com/github/github-mcp-server
license: MIT
translations:
  pt-BR:
    name: GitHub
    description: Servidor MCP oficial do GitHub — acessa PRs, issues, reviews,
      checks de CI, commits, branches e releases com schema estruturado que o
      agente consegue raciocinar. Prefira em vez do `gh` CLI puro porque as
      respostas de list-and-filter vêm tipadas, não parseadas de stdout.
      Limite o GITHUB_PERSONAL_ACCESS_TOKEN a escopos estreitos (contents,
      pull-requests, issues) e rotacione trimestralmente.
