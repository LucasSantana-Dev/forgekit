  </g>

  <text x="80" y="260" fill="#ffffff" font-family="'Geist','Inter','SF Pro Display',system-ui,-apple-system,sans-serif" font-size="92" font-weight="800" letter-spacing="-4">Forge Kit</text>
  <text x="80" y="330" fill="#d4d4d8" font-family="'Geist','Inter',system-ui,-apple-system,sans-serif" font-size="36" font-weight="500" letter-spacing="-1">Skills · Agents · MCP servers · Hooks · Tools</text>
  <text x="80" y="388" fill="#a1a1aa" font-family="'Geist','Inter',system-ui,-apple-system,sans-serif" font-size="28" font-weight="400" letter-spacing="-0.5">A curated catalog for AI-assisted development</text>

  <g transform="translate(80,470)" fill="#d4d4d8" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="26">
