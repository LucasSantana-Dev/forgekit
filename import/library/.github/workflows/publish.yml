name: publish-cli

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter adtl run build
      - name: Verify tag matches cli/package.json version
        run: |
          tag="${GITHUB_REF_NAME#cli-v}"
          pkgver=$(node -p "require('./cli/package.json').version")
          if [ "$tag" != "$pkgver" ]; then
            echo "::error::tag ($tag) does not match cli/package.json version ($pkgver)"
            exit 1
          fi
      - name: npm publish
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
