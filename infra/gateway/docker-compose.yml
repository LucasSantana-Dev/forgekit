# Forge Kit local gateway stack
#
# Single-user, localhost-only. Each friend runs their own instance.
# Gateway is bound to 127.0.0.1 ONLY — never expose on 0.0.0.0.
#
# Usage:
#   cp .env.example .env            # then edit secrets
#   docker compose up -d
#   python seeds/seed.py            # register catalog servers

services:
  gateway:
    image: ghcr.io/ibm/mcp-context-forge:latest
    container_name: adtl-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-4444}:4444"
    environment:
      HOST: 0.0.0.0
      PORT: 4444
      DATABASE_URL: ${DATABASE_URL:-postgresql://gateway:gateway@postgres:5432/gateway}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET}
      BASIC_AUTH_USER: ${ADMIN_USER:-admin}
      BASIC_AUTH_PASSWORD: ${GATEWAY_ADMIN_TOKEN}
      AUTH_REQUIRED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: adtl-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adtl-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
