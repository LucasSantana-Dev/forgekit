name: Deploy webapp

# Auto-deploy apps/web to Cloudflare Workers on every push to main that
# touches the webapp surface or the catalog data that drives it.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN — token with `Workers Scripts:Edit` permission on
#                          the account that owns `ai-dev-toolkit-library`.
#                          Create at: https://dash.cloudflare.com/profile/api-tokens
#                          (template: "Edit Cloudflare Workers")
#
# Until the secret is configured, this workflow short-circuits with a
# non-fatal log line so the PR feedback isn't a sea of red. Configure the
# secret, then trigger a deploy via `workflow_dispatch` or any push that
# matches the path filter.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/catalog/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy webapp
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Cloudflare credentials
        id: creds
        env:
          HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set; skipping deploy. Configure it in repo Settings → Secrets and variables → Actions to enable auto-deploy."
          fi

      - name: Setup pnpm
        if: steps.creds.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: steps.creds.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.creds.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate catalog
        if: steps.creds.outputs.ready == 'true'
        run: pnpm --filter @forge-kit/catalog run validate

      - name: Build webapp
        if: steps.creds.outputs.ready == 'true'
        run: pnpm --filter @forge-kit/web run build

      - name: Deploy to Cloudflare Workers
        if: steps.creds.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy

      - name: Smoke check
        if: steps.creds.outputs.ready == 'true'
        run: |
          # The deploy returns before the route is fully warm. Allow a brief
          # grace, then probe the canonical URL. A failure here surfaces a
          # broken deploy without rolling back automatically.
          sleep 8
          for url in \
            "https://forgekit.lucassantana.tech/" \
            "https://forgekit.lucassantana.tech/sitemap-index.xml" \
            "https://forgekit.lucassantana.tech/robots.txt"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0" "$url")
            echo "  $url → $code"
            if [ "$code" != "200" ]; then
              echo "::error::$url returned $code (expected 200)"
              exit 1
            fi
          done
