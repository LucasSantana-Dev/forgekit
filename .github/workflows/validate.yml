name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links in changed Markdown files
        if: github.event_name == 'pull_request'
        uses: tcort/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          config-file: ".github/markdown-link-check-config.json"
          check-modified-files-only: "yes"
          base-branch: ${{ github.base_ref }}

      - name: Check links in all Markdown files
        if: github.event_name != 'pull_request'
        uses: tcort/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          config-file: ".github/markdown-link-check-config.json"

  shell-scripts:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./packages/core/tools"
          severity: warning
          ignore_paths: "*.ps1"

  python-tools:
    name: Validate Python Tools
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Python syntax
        run: python3 -m py_compile packages/core/tools/*.py

      - name: Smoke test release preflight
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          repo="$tmpdir/repo"
          mkdir -p "$repo" "$tmpdir/home"
          git -C "$repo" init -q
          git -C "$repo" config user.name "CI"
          git -C "$repo" config user.email "ci@example.com"
          printf '0.1.0\n' > "$repo/VERSION"
          cat > "$repo/CHANGELOG.md" <<'EOF'
          # Changelog

          ## [Unreleased]
          EOF
          git -C "$repo" add VERSION CHANGELOG.md
          git -C "$repo" commit -qm 'chore: seed release inputs'
          git -C "$repo" tag -a v0.1.1 -m 'chore: seed release tag'
          git -C "$repo" config --unset user.name
          git -C "$repo" config --unset user.email
          set +e
          HOME="$tmpdir/home" GIT_CONFIG_GLOBAL=/dev/null GIT_CONFIG_SYSTEM=/dev/null \
            python3 packages/core/tools/release.py --repo "$repo" --verify --level patch --notes-file "$tmpdir/RELEASE_NOTES.md" --changelog > "$tmpdir/preflight.txt"
          rc=$?
          set -e
          test "$rc" -eq 1
          cat "$tmpdir/preflight.txt"
          grep -q '^overall: blocked$' "$tmpdir/preflight.txt"
          grep -q '^git working tree: ready clean$' "$tmpdir/preflight.txt"
          grep -q '^git identity: blocked missing user.name, user.email$' "$tmpdir/preflight.txt"
          grep -q '^version source: ready VERSION$' "$tmpdir/preflight.txt"
          grep -q '^target tag: blocked v0.1.1 already exists$' "$tmpdir/preflight.txt"
          grep -q '^changelog: ready ' "$tmpdir/preflight.txt"
          grep -q '^notes file: ready ' "$tmpdir/preflight.txt"

  setup-package:
    name: Validate setup package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate setup shell syntax
        run: |
          bash -n \
            packages/setup/bootstrap.sh \
            packages/setup/scripts/*.sh \
            packages/setup/config/shell/shell.sh \
            packages/setup/config/tmux/*.sh \
            packages/setup/config/iterm2/*.sh

      - name: Validate setup Python syntax
        env:
          PYTHONPYCACHEPREFIX: /tmp/forge-kit-pycache
        run: |
          python3 -m py_compile \
            packages/setup/scripts/*.py \
            packages/setup/config/tmux/*.py \
            packages/setup/config/iterm2/*.py

  workspace-packages:
    name: Validate catalog, CLI, and web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup pnpm
        run: corepack enable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate catalog
        run: pnpm run catalog:validate
      - name: Typecheck CLI
        run: pnpm run cli:typecheck
      - name: Build web app
        run: pnpm run web:build

  powershell-scripts:
    name: Validate PowerShell Scripts
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./packages/core/tools/*.ps1 -Severity Warning -ExcludeRule PSAvoidUsingWriteHost
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  validate-schema:
    name: Validate company schemas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate schemas
        run: npm run validate:schema

  lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  typecheck-plugin:
    name: Typecheck OpenCode plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck plugin sources
        run: npm run typecheck:plugin

  validate-companies:
    name: Validate Company Schemas (Bash)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate company schemas
        run: bash packages/core/tools/validate-companies.sh
